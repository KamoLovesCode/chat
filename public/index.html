<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat - Join</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="join-container">
        <div class="join-card">
            <div class="join-header">
                <h1>Join Live Chat</h1>
                <p>Choose your name and avatar to start chatting</p>
            </div>

            <form id="joinForm" class="join-form">
                <div class="form-group">
                    <label for="username">Your Name</label>
                    <input type="text" id="username" placeholder="Enter your name..." maxlength="20" required>
                    <div id="usernameError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label>Choose Avatar</label>
                    <div id="avatarGrid" class="avatar-grid">
                        <!-- Avatars will be loaded here -->
                    </div>
                    <div id="avatarError" class="error-message"></div>
                </div>

                <button type="submit" id="joinBtn" class="join-btn">
                    <span>Join Chat</span>
                </button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="join.js"></script>
</body>
</html>
