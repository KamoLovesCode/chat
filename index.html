<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat App</title>
</head>
<body>
    <h1>Live Chat App</h1>
    <div id="login">
        <input type="text" id="username" placeholder="Enter your username">
        <button id="loginBtn">Login</button>
    </div>
    <div id="chat" style="display: none;">
        <h2>Welcome, <span id="currentUser"></span></h2>
        <div>
            <h3>Online Users</h3>
            <ul id="userList"></ul>
        </div>
        <div>
            <h3>Chat</h3>
            <div id="chatBox"></div>
            <input type="text" id="message" placeholder="Type a message">
            <button id="sendBtn">Send</button>
        </div>
    </div>
    <script>
        // Use localStorage for users and chats
        let users = {};
        let chats = {};
        let currentUserId = null;
        let selectedUser = null;

        const loginDiv = document.getElementById('login');
        const chatDiv = document.getElementById('chat');
        const usernameInput = document.getElementById('username');
        const loginBtn = document.getElementById('loginBtn');
        const currentUser = document.getElementById('currentUser');
        const userList = document.getElementById('userList');
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('message');
        const sendBtn = document.getElementById('sendBtn');

        // Load from localStorage
        function loadLocalData() {
            users = JSON.parse(localStorage.getItem('users') || '{}');
            chats = JSON.parse(localStorage.getItem('chats') || '{}');
        }

        // Save to localStorage
        function saveLocalData() {
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('chats', JSON.stringify(chats));
        }

        // Initialize app
        function init() {
            loadLocalData();
        }

        loginBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            if (username) {
                currentUserId = `user_${Date.now()}`;
                currentUser.textContent = username;
                loginDiv.style.display = 'none';
                chatDiv.style.display = 'block';

                // Add user to users list
                users[currentUserId] = username;
                saveLocalData();
                updateUserList();
            }
        });

        function updateUserList() {
            userList.innerHTML = '';
            for (const id in users) {
                if (id !== currentUserId) {
                    const li = document.createElement('li');
                    li.textContent = users[id];
                    li.addEventListener('click', () => {
                        selectedUser = id;
                        chatBox.innerHTML = `<h4>Chat with ${users[id]}</h4>`;
                        loadChat(selectedUser);
                    });
                    userList.appendChild(li);
                }
            }
        }

        sendBtn.addEventListener('click', () => {
            const message = messageInput.value.trim();
            if (message && selectedUser) {
                const chatId = [currentUserId, selectedUser].sort().join('_');
                if (!chats[chatId]) chats[chatId] = [];
                chats[chatId].push({ from: currentUserId, message });
                saveLocalData();
                messageInput.value = '';
                loadChat(selectedUser);
            }
        });

        function loadChat(userId) {
            const chatId = [currentUserId, userId].sort().join('_');
            chatBox.innerHTML = `<h4>Chat with ${users[userId]}</h4>`;
            if (chats[chatId]) {
                chats[chatId].forEach((msg) => {
                    const sender = msg.from === currentUserId ? 'You' : users[userId];
                    chatBox.innerHTML += `<p><strong>${sender}:</strong> ${msg.message}</p>`;
                });
            }
        }

        window.addEventListener('beforeunload', () => {
            if (currentUserId) {
                delete users[currentUserId];
                saveLocalData();
            }
        });

        init();
    </script>
</body>
</html>
